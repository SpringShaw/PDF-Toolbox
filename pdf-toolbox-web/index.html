<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self'; img-src 'self' data: blob:; object-src 'self' blob:; frame-src 'self' blob:;">
    <meta name="referrer" content="no-referrer">
    <title>PDF 工具箱</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>PDF 工具箱</h1>
            <button id="langBtn" class="lang-btn">English</button>
        </header>

        <nav class="tabs">
            <button class="tab active" data-tab="preview">预览</button>
            <button class="tab" data-tab="merge">合并</button>
            <button class="tab" data-tab="split">拆分</button>
            <button class="tab" data-tab="extract">提取</button>
            <button class="tab" data-tab="compress">压缩</button>
            <button class="tab" data-tab="watermark">水印</button>
            <button class="tab" data-tab="delete">删除页面</button>
            <button class="tab" data-tab="rotate">旋转</button>
            <button class="tab" data-tab="image">图片转PDF</button>
        </nav>

        <main>
            <!-- 预览 -->
            <section id="preview" class="panel active">
                <h2>PDF 预览</h2>
                <div class="upload-area" id="previewUpload">
                    <input type="file" id="previewFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="previewFile" class="link">点击选择</label></p>
                </div>
                <div id="previewContainer" class="preview-container"></div>
            </section>

            <!-- 合并 -->
            <section id="merge" class="panel">
                <h2>合并 PDF</h2>
                <div class="upload-area" id="mergeUpload">
                    <input type="file" id="mergeFiles" multiple accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="mergeFiles" class="link">点击选择</label></p>
                </div>
                <div id="mergeFileList" class="file-list"></div>
                <button id="mergeBtn" class="btn primary" disabled>开始合并</button>
            </section>

            <!-- 拆分 -->
            <section id="split" class="panel">
                <h2>拆分 PDF</h2>
                <div class="upload-area" id="splitUpload">
                    <input type="file" id="splitFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="splitFile" class="link">点击选择</label></p>
                </div>
                <div id="splitFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>拆分方式：</label>
                    <select id="splitMode">
                        <option value="single">每页拆分</option>
                        <option value="range">按范围拆分</option>
                    </select>
                </div>
                <div id="splitRangeGroup" class="form-group hidden">
                    <label>页码范围（如：1-3,5,7-10）：</label>
                    <input type="text" id="splitRange" maxlength="100" placeholder="1-3,5,7-10">
                </div>
                <button id="splitBtn" class="btn primary" disabled>开始拆分</button>
            </section>

            <!-- 提取 -->
            <section id="extract" class="panel">
                <h2>提取页面</h2>
                <div class="upload-area" id="extractUpload">
                    <input type="file" id="extractFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="extractFile" class="link">点击选择</label></p>
                </div>
                <div id="extractFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>页码范围（如：1,3-5）：</label>
                    <input type="text" id="extractPages" maxlength="100" placeholder="1,3-5">
                </div>
                <button id="extractBtn" class="btn primary" disabled>开始提取</button>
            </section>

            <!-- 压缩 -->
            <section id="compress" class="panel">
                <h2>压缩</h2>
                <div class="upload-area" id="compressUpload">
                    <input type="file" id="compressFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="compressFile" class="link">点击选择</label></p>
                </div>
                <div id="compressFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>压缩质量：</label>
                    <select id="compressQuality">
                        <option value="0.3">低质量（最小体积）</option>
                        <option value="0.5" selected>中等质量</option>
                        <option value="0.7">高质量（保留细节）</option>
                    </select>
                </div>
                <button id="compressBtn" class="btn primary" disabled>开始压缩</button>
            </section>

            <!-- 水印 -->
            <section id="watermark" class="panel">
                <h2>添加水印</h2>
                <div class="upload-area" id="watermarkUpload">
                    <input type="file" id="watermarkFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="watermarkFile" class="link">点击选择</label></p>
                </div>
                <div id="watermarkFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>水印文本：</label>
                    <input type="text" id="watermarkText" placeholder="请输入水印文本" value="机密">
                </div>
                <div class="form-group">
                    <label>字体大小：</label>
                    <input type="number" id="watermarkSize" value="48" min="10" max="200">
                </div>
                <div class="form-group">
                    <label>旋转角度：</label>
                    <input type="number" id="watermarkAngle" value="45" min="0" max="360">
                </div>
                <div class="form-group">
                    <label>页码范围（留空则全部添加）：</label>
                    <input type="text" id="watermarkPages" placeholder="1-3,5">
                </div>
                <button id="watermarkBtn" class="btn primary" disabled>添加水印</button>
            </section>

            <!-- 删除页面 -->
            <section id="delete" class="panel">
                <h2>删除页面</h2>
                <div class="upload-area" id="deleteUpload">
                    <input type="file" id="deleteFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="deleteFile" class="link">点击选择</label></p>
                </div>
                <div id="deleteFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>要删除的页码（如：1,3-5）：</label>
                    <input type="text" id="deletePages" placeholder="1,3-5">
                </div>
                <button id="deleteBtn" class="btn primary" disabled>删除页面</button>
            </section>

            <!-- 旋转 -->
            <section id="rotate" class="panel">
                <h2>旋转页面</h2>
                <div class="upload-area" id="rotateUpload">
                    <input type="file" id="rotateFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="rotateFile" class="link">点击选择</label></p>
                </div>
                <div id="rotateFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>旋转角度：</label>
                    <select id="rotateAngle">
                        <option value="90">90°</option>
                        <option value="180">180°</option>
                        <option value="270">270°</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>页码范围（留空则全部旋转）：</label>
                    <input type="text" id="rotatePages" placeholder="1-3,5">
                </div>
                <button id="rotateBtn" class="btn primary" disabled>开始旋转</button>
            </section>

            <!-- 图片转PDF -->
            <section id="image" class="panel">
                <h2>图片转 PDF</h2>
                <div class="upload-area" id="imageUpload">
                    <input type="file" id="imageFiles" multiple accept="image/png,image/jpeg,image/webp" hidden>
                    <p>拖放图片到此处或 <label for="imageFiles" class="link">点击选择</label></p>
                </div>
                <div id="imageFileList" class="file-list"></div>
                <button id="imageBtn" class="btn primary" disabled>开始转换</button>
            </section>
        </main>

        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
