<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 工具箱</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>PDF 工具箱</h1>
            <button id="langBtn" class="lang-btn">English</button>
        </header>

        <nav class="tabs">
            <button class="tab active" data-tab="merge">合并</button>
            <button class="tab" data-tab="split">拆分</button>
            <button class="tab" data-tab="extract">提取</button>
            <button class="tab" data-tab="rotate">旋转</button>
            <button class="tab" data-tab="encrypt">加密</button>
            <button class="tab" data-tab="decrypt">解密</button>
            <button class="tab" data-tab="watermark">水印</button>
        </nav>

        <main>
            <!-- 合并 -->
            <section id="merge" class="panel active">
                <h2>合并 PDF</h2>
                <div class="upload-area" id="mergeUpload">
                    <input type="file" id="mergeFiles" multiple accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="mergeFiles" class="link">点击选择</label></p>
                </div>
                <div id="mergeFileList" class="file-list"></div>
                <button id="mergeBtn" class="btn primary" disabled>开始合并</button>
            </section>

            <!-- 拆分 -->
            <section id="split" class="panel">
                <h2>拆分 PDF</h2>
                <div class="upload-area" id="splitUpload">
                    <input type="file" id="splitFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="splitFile" class="link">点击选择</label></p>
                </div>
                <div id="splitFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>拆分方式：</label>
                    <select id="splitMode">
                        <option value="single">每页拆分</option>
                        <option value="range">按范围拆分</option>
                    </select>
                </div>
                <div id="splitRangeGroup" class="form-group hidden">
                    <label>页码范围（如：1-3,5,7-10）：</label>
                    <input type="text" id="splitRange" placeholder="1-3,5,7-10">
                </div>
                <button id="splitBtn" class="btn primary" disabled>开始拆分</button>
            </section>

            <!-- 提取 -->
            <section id="extract" class="panel">
                <h2>提取页面</h2>
                <div class="upload-area" id="extractUpload">
                    <input type="file" id="extractFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="extractFile" class="link">点击选择</label></p>
                </div>
                <div id="extractFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>页码范围（如：1,3-5）：</label>
                    <input type="text" id="extractPages" placeholder="1,3-5">
                </div>
                <button id="extractBtn" class="btn primary" disabled>开始提取</button>
            </section>

            <!-- 旋转 -->
            <section id="rotate" class="panel">
                <h2>旋转页面</h2>
                <div class="upload-area" id="rotateUpload">
                    <input type="file" id="rotateFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="rotateFile" class="link">点击选择</label></p>
                </div>
                <div id="rotateFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>旋转角度：</label>
                    <select id="rotateAngle">
                        <option value="90">90°</option>
                        <option value="180">180°</option>
                        <option value="270">270°</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>页码范围（留空则全部旋转）：</label>
                    <input type="text" id="rotatePages" placeholder="1-3,5">
                </div>
                <button id="rotateBtn" class="btn primary" disabled>开始旋转</button>
            </section>

            <!-- 加密 -->
            <section id="encrypt" class="panel">
                <h2>加密 PDF</h2>
                <div class="upload-area" id="encryptUpload">
                    <input type="file" id="encryptFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="encryptFile" class="link">点击选择</label></p>
                </div>
                <div id="encryptFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>设置密码：</label>
                    <input type="password" id="encryptPassword" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>确认密码：</label>
                    <input type="password" id="encryptPasswordConfirm" placeholder="请再次输入密码">
                </div>
                <button id="encryptBtn" class="btn primary" disabled>开始加密</button>
            </section>

            <!-- 解密 -->
            <section id="decrypt" class="panel">
                <h2>解密 PDF</h2>
                <div class="upload-area" id="decryptUpload">
                    <input type="file" id="decryptFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="decryptFile" class="link">点击选择</label></p>
                </div>
                <div id="decryptFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>输入密码：</label>
                    <input type="password" id="decryptPassword" placeholder="请输入密码">
                </div>
                <button id="decryptBtn" class="btn primary" disabled>开始解密</button>
            </section>

            <!-- 水印 -->
            <section id="watermark" class="panel">
                <h2>添加水印</h2>
                <div class="upload-area" id="watermarkUpload">
                    <input type="file" id="watermarkFile" accept=".pdf" hidden>
                    <p>拖放文件到此处或 <label for="watermarkFile" class="link">点击选择</label></p>
                </div>
                <div id="watermarkFileInfo" class="file-info"></div>
                <div class="form-group">
                    <label>水印文本：</label>
                    <input type="text" id="watermarkText" placeholder="请输入水印文本" value="机密">
                </div>
                <div class="form-group">
                    <label>字体大小：</label>
                    <input type="number" id="watermarkSize" value="48" min="10" max="200">
                </div>
                <div class="form-group">
                    <label>旋转角度：</label>
                    <input type="number" id="watermarkAngle" value="45" min="0" max="360">
                </div>
                <div class="form-group">
                    <label>页码范围（留空则全部添加）：</label>
                    <input type="text" id="watermarkPages" placeholder="1-3,5">
                </div>
                <button id="watermarkBtn" class="btn primary" disabled>添加水印</button>
            </section>
        </main>

        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
